name = "api-transform-proxy-1"
main = "src/index.js"
compatibility_date = "2026-03-01"
workers_dev = true

# KV binding (no IDs) -> automatic provisioning on deploy (beta)
[[kv_namespaces]]
binding = "CONFIG"

[vars]
BUILD_TIMESTAMP = "dev"

[[rules]]
type = "Text"
globs = ["src/ui/templates/*.html", "src/ui/templates/*.js"]
