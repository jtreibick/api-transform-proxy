# Full configuration template (all fields shown, mostly commented)

targetHost: null # string or null. When set, X-Proxy-Host is ignored.
proxyName: null  # friendly name

http_auth:
  profiles:
    logging:
      timestamp_format: epoch_ms # epoch_ms | epoch_seconds | iso_8601
      headers:
        Authorization: "Bearer {{current}}"
    target:
      timestamp_format: epoch_ms
      headers:
        Authorization: "Bearer {{current}}"
    jwt_inbound:
      timestamp_format: epoch_ms
      headers:
        Authorization: "Bearer {{current}}"

jwt:
  enabled: false
  header: Authorization
  scheme: Bearer
  issuer: null
  audience: null
  clock_skew_seconds: 0
  http_request:
    method: GET
    url: "https://example.com/.well-known/jwks.json"
    headers:
      # Header-Name: value
    body_type: none
    body: {}
    authorization:
      type: key_rotation # static | key_rotation
      auth_headers:
        Authorization: "Bearer ${authorization_key}"
        Access-Token: "${current_token_value}"
      key_rotation:
        key_rotation_http_request:
          method: POST
          url: "https://api.example.com/token"
          headers:
            # Header-Name: value
          body_type: json
          body:
            client_id: "${client_id}"
            client_secret: "${client_secret}"
            grant_type: "client_credentials"
        key_rotation_http_response:
          current_token_value: data.apiKey
          current_token_ttl: data.ttl
          current_token_ttl_unit: seconds # seconds | minutes | hours

apiKeyPolicy:
  proxyExpirySeconds: null
  issuerExpirySeconds: null
  adminExpirySeconds: null

targetCredentialRotation:
  enabled: false
  strategy: json_ttl # json_ttl | oauth_client_credentials
  request:
    method: POST
    url: "https://api.example.com/token"
    headers:
      # Header-Name: value
    body:
      type: json
      value:
        client_id: "..."
        client_secret: "..."
        grant_type: "client_credentials"
    http_authorization:
      type: static # static | key_rotation
      static:
        headers:
          Authorization: "Bearer {{target_auth_key}}"
        secret_ref: target_auth_key
      key_rotation:
        profile: target
  response:
    key_path: data.apiKey
    ttl_path: data.ttl
    ttl_unit: seconds # seconds | minutes | hours
    expires_at_path: null
  trigger:
    refresh_skew_seconds: 300
    retry_once_on_401: true

debug:
  max_debug_session_seconds: 3600
  loggingEndpoint:
    http_request:
      method: POST
      url: "https://logs.example.com/ingest"
      headers:
        Content-Type: application/json
      body:
        type: json
        value: {}
      http_authorization:
        type: key_rotation # static | key_rotation
        static:
          headers:
            Authorization: "Bearer {{logging_auth_key}}"
          secret_ref: logging_auth_key
        key_rotation:
          profile: logging

transform:
  enabled: true
  # Legacy (pre-split) transform keys (supported):
  # defaultExpr: ""
  # fallback: passthrough
  # rules: []
  outbound:
    enabled: false
    custom_js_preprocessor: null
    defaultExpr: ""
    fallback: passthrough # passthrough | error | transform_default
    rules:
      # - name: outbound_rule
      #   method: [GET, POST]
      #   path: ["/v1/*"]
      #   headers:
      #     - name: x-api-mode
      #       value: legacy
      #   expr: |
      #     { "request": $ }
  inbound:
    enabled: true
    custom_js_preprocessor: null
    defaultExpr: ""
    fallback: passthrough
    header_filtering:
      mode: blacklist # blacklist | whitelist
      names: []
    rules:
      # - name: errors_json
      #   status: [4xx, 5xx, 422]
      #   type: json # json | text | binary | any
      #   headers:
      #     - name: x-api-mode
      #       value: legacy
      #   expr: |
      #     { "ok": false, "status": status, "error": body }

header_forwarding:
  mode: blacklist # blacklist | whitelist
  names:
    - connection
    - keep-alive
    - proxy-authenticate
    - proxy-authorization
    - te
    - trailer
    - transfer-encoding
    - upgrade
    - host
    - content-length
    - x-proxy-key
    - x-admin-key
    - x-issuer-key
    - x-proxy-host
